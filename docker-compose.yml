services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket-rush-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ticket
      POSTGRES_PASSWORD: ticket_dev_pw
      POSTGRES_DB: ticket_rush
    ports:
      - "5432:5432"
    volumes:
      - ticket_rush_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket -d ticket_rush"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticket-rush-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ticket_rush_data: